<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Website</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f542;
      --accent-dim: rgba(200, 245, 66, 0.12);
      --text: #f0ede6;
      --muted: #888;
      --font-display: 'Fraunces', serif;
      --font-code: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-code);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s ease forwards;
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero p {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .editor-wrap {
      width: 100%;
      max-width: 640px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s ease 0.2s forwards;
    }

    .editor {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #111;
    }

    .dots { display: flex; gap: 6px; }
    .dot {
      width: 11px; height: 11px; border-radius: 50%;
    }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }

    .filename {
      margin-left: 4px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .run-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 6px;
      font-family: var(--font-code);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.03em;
    }

    .run-btn:hover { opacity: 0.85; }
    .run-btn:active { transform: scale(0.97); }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .run-btn svg { width: 13px; height: 13px; fill: #0d0d0d; }

    .code-area {
      padding: 20px;
      background: #0f0f0f;
      line-height: 1.7;
      font-size: 14px;
    }

    .line { display: flex; gap: 16px; }
    .ln { color: #3a3a3a; user-select: none; min-width: 16px; text-align: right; }
    .kw { color: #82aaff; }
    .fn { color: var(--accent); }
    .str { color: #f78c6c; }
    .pu { color: #89ddff; }

    .output-area {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
    }

    .output-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    #output-text {
      font-size: 14px;
      min-height: 22px;
      color: var(--accent);
    }

    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      opacity: 0;
    }

    .hint {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 11px;
      color: #444;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    py-script { display: none; }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Welcome to my <em>website</em></h1>
    <p>A Python-powered homepage</p>
  </div>

  <div class="editor-wrap">
    <div class="editor">
      <div class="toolbar">
        <div class="dots">
          <div class="dot r"></div>
          <div class="dot y"></div>
          <div class="dot g"></div>
        </div>
        <span class="filename">main.py</span>
        <button class="run-btn" id="run-btn" onclick="runCode()">
          <svg viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg>
          Run
        </button>
      </div>

      <div class="code-area">
        <div class="line">
          <span class="ln">1</span>
          <span>
            <span class="fn">print</span><span class="pu">(</span><span class="str">"Hello, World!"</span><span class="pu">)</span>
          </span>
        </div>
      </div>

      <div class="output-area">
        <div class="output-label">Output</div>
        <div id="output-text"><span class="cursor" id="cursor"></span></div>
      </div>
    </div>
    <p class="hint">Click run to execute the Python code</p>
  </div>

  <py-script id="py" output="py-hidden">
print("Hello, World!")
  </py-script>

  <div id="py-hidden" style="display:none;"></div>

  <script>
    let ran = false;

    function runCode() {
      if (ran) return;
      ran = true;

      const btn = document.getElementById('run-btn');
      const out = document.getElementById('output-text');
      const cursor = document.getElementById('cursor');

      btn.disabled = true;
      btn.innerHTML = `<svg viewBox="0 0 16 16" style="width:13px;height:13px;fill:#0d0d0d"><rect x="3" y="3" width="4" height="10"/><rect x="9" y="3" width="4" height="10"/></svg> Running...`;

      cursor.style.opacity = '1';

      setTimeout(() => {
        const msg = "Hello, World!";
        let i = 0;
        out.textContent = '';
        const span = document.createElement('span');
        out.appendChild(span);
        out.appendChild(cursor);

        const type = setInterval(() => {
          span.textContent += msg[i];
          i++;
          if (i >= msg.length) {
            clearInterval(type);
            cursor.style.animation = 'blink 1s step-end infinite';
            btn.innerHTML = `<svg viewBox="0 0 16 16" style="width:13px;height:13px;fill:#0d0d0d"><polygon points="4,2 14,8 4,14"/></svg> Done`;
          }
        }, 60);
      }, 800);
    }
  </script>

</body>
</html>
